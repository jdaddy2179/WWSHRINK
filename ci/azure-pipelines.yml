# ============================================================================
# WW Smoke — run automated tests from Azure Test Plans (YAML-native)
# ----------------------------------------------------------------------------
# Replaces the on-prem classic release "PlaywrightAutoRelease". Instead of a
# 9-stage release, this single YAML pipeline runs the automated tests that are
# associated with the test cases in:
#       Test Plan 79388  /  Suite 79389  /  Configuration 45  ("WW Smoke")
# and publishes pass/fail back onto the test points, so results show up in
# Azure Test Plans.
#
# Pick the target environment at run time (Run pipeline -> set 'testEnv').
# The app reads TEST_ENV and loads appsettings.<ENV>.json itself, so no
# File Transform step is needed (legacy used File Transform; not required here).
#
# Runs on a SELF-HOSTED pool (AppSvcs-OnPrem-SQA): the suite targets internal
# *.dqtest.ad hosts, on-prem SQL, and an on-prem NuGet feed that Microsoft-
# hosted agents cannot reach.
# ============================================================================

trigger: none
pr: none

parameters:
  - name: testEnv
    displayName: 'Target environment (appsettings.<ENV>.json)'
    type: string
    default: QAR
    values: [DS01, DS10, QAR, PROD, TS06, TSHF, TSNB5, TSNB6, TSNB7, TSSLADJ]

schedules:
  - cron: '0 6 * * *'
    displayName: 'Nightly QAR run'
    branches:
      include:
        - main
    always: false

pool:
  name: AppSvcs-OnPrem-SQA

variables:
  # Library variable group with the secrets the suite reads from the env:
  #   PLAYWRIGHT_USERNAME, DbSettings__DbUserId, DbSettings__DbPassword
  - group: PlaywrightAutomation-Secrets
  - name: buildConfiguration
    value: 'Release'
  - name: solution
    value: 'PlaywrightAutomation.sln'

steps:
  - checkout: self
    clean: true

  # Fail fast with a clear message if required secrets are missing, instead of
  # hanging at the app Sign In page (PLAYWRIGHT_USERNAME) or erroring deep in a
  # DB call (DbSettings__*). Catches an unauthorized/missing variable group too.
  - powershell: |
      $missing = @()
      if ([string]::IsNullOrWhiteSpace($env:PLAYWRIGHT_USERNAME))   { $missing += 'PLAYWRIGHT_USERNAME' }
      if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbUserId))   { $missing += 'DbSettings__DbUserId' }
      if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbPassword)) { $missing += 'DbSettings__DbPassword' }
      if ($missing.Count -gt 0) {
        Write-Host "##vso[task.logissue type=error]Missing required variable(s): $($missing -join ', '). Check that the 'PlaywrightAutomation-Secrets' variable group is linked AND authorized for this pipeline (Library -> group -> Pipeline permissions)."
        exit 1
      }
      Write-Host "All required variables are present."
    displayName: 'Verify required variables'
    env:
      PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
      DbSettings__DbUserId: $(DbSettings__DbUserId)
      DbSettings__DbPassword: $(DbSettings__DbPassword)

  - task: UseDotNet@2
    displayName: 'Install .NET 8 SDK'
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - task: VisualStudioTestPlatformInstaller@1
    displayName: 'Install VSTest platform'
    inputs:
      packageFeedSelector: 'nugetOrg'
      versionSelector: 'latestStable'

  - task: DotNetCoreCLI@2
    displayName: 'Restore'
    inputs:
      command: 'restore'
      projects: '$(solution)'
      feedsToUse: 'config'
      nugetConfigPath: 'NuGet.Config'

  - task: DotNetCoreCLI@2
    displayName: 'Build ($(buildConfiguration))'
    inputs:
      command: 'build'
      projects: '$(solution)'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - powershell: |
      $ErrorActionPreference = 'Continue'
      # The suite drives the system-installed Microsoft Edge (Channel = "msedge").
      # If Edge is already on the agent, Playwright refuses to install over it
      # (exits 1, "already installed") - which is the desired state. So when the
      # system Edge is present we skip the download entirely; we only run
      # 'playwright install' if Edge is genuinely missing.
      $edgePaths = @(
        "$Env:ProgramFiles\Microsoft\Edge\Application\msedge.exe",
        "${Env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
      )
      if ($edgePaths | Where-Object { Test-Path $_ }) {
        Write-Host "System Microsoft Edge found; Channel=msedge will use it. Skipping Playwright browser download."
        exit 0
      }
      Write-Host "System Edge not found; installing Playwright's msedge build."
      $script = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "playwright.ps1" |
                Where-Object { $_.FullName -like "*\bin\$(buildConfiguration)\*" } |
                Select-Object -First 1
      if (-not $script) { Write-Error "playwright.ps1 not found - build may have failed"; exit 1 }
      & $script.FullName install msedge
      exit 0
    displayName: 'Ensure Playwright browser (msedge channel)'

  # Runs the automated tests for the test points in Plan/Suite/Config and
  # writes their outcomes back to Azure Test Plans (testSelector: testPlan).
  - task: VSTest@2
    displayName: 'Run WW Smoke test plan (${{ parameters.testEnv }})'
    inputs:
      testSelector: 'testPlan'
      testPlan: '79388'
      testSuite: '79389'
      testConfiguration: '45'
      searchFolder: '$(System.DefaultWorkingDirectory)'
      testAssemblyVer2: |
        **\bin\**\PlaywrightAutomation.dll
        !**\*TestAdapter.dll
        !**\ref\**
        !**\obj\**
      # Use the modern platform from VisualStudioTestPlatformInstaller@1.
      # Without this, VSTest falls back to the agent's legacy 14.0 platform,
      # which cannot load .NET 8 / NUnit3 assemblies (discovers 0 tests).
      vsTestVersion: 'toolsInstaller'
      uiTests: true
      runInParallel: false
      codeCoverageEnabled: false
      testRunTitle: 'WW Smoke - ${{ parameters.testEnv }}'
    env:
      TEST_ENV: ${{ parameters.testEnv }}
      PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
      DbSettings__DbUserId: $(DbSettings__DbUserId)
      DbSettings__DbPassword: $(DbSettings__DbPassword)
