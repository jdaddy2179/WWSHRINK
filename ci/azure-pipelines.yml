# ============================================================================
# WW Smoke — run Playwright tests directly + rich HTML reporting (YAML-native)
# ----------------------------------------------------------------------------
# Replaces the on-prem classic release "PlaywrightAutoRelease" AND the earlier
# Azure Test Plan approach. Tests are selected by NUnit Category (no test plan,
# no suites, no configurations, no point mapping), run with VSTest, and the
# results land in:
#   * the native Azure DevOps "Tests" tab - clickable per-test failure message +
#     stack trace + the Playwright screenshot/trace/video the fixture attaches
#     on failure (the easy-to-read HTML view, no extra tooling), and
#   * an optional standalone Allure HTML report published as an artifact.
#
# Pick the environment at run time ('testEnv' -> appsettings.<ENV>.json) and the
# scope ('testScope' -> a category filter). The build passes unless the pass
# rate falls below 'minPassPercent' (default 80), so a few known-failing tests
# don't turn the pipeline red.
#
# Runs on a SELF-HOSTED pool (AppSvcs-OnPrem-SQA): the suite targets internal
# *.dqtest.ad hosts, on-prem SQL, and an on-prem NuGet feed that Microsoft-
# hosted agents cannot reach.
# ============================================================================

trigger: none
pr: none

parameters:
  - name: testScope
    displayName: 'Which tests to run'
    type: string
    default: 'Smoke (TestEnv)'
    values:
      - 'Smoke (TestEnv)'      # Category TestEnv, excluding Delta classes
      - 'WebServer (Prod)'     # Category WebServer (run with testEnv=PROD)
      - 'Regression'           # Category Regression
      - 'All (no Delta)'       # everything except Delta classes
  - name: testEnv
    displayName: 'Target environment (appsettings.<ENV>.json)'
    type: string
    default: TS06
    values: [DS01, DS10, QAR, PROD, TS06, TSHF, TSNB5, TSNB6, TSNB7, TSSLADJ]
  - name: browserChannel
    displayName: 'Browser to run on'
    type: string
    default: msedge
    values: [msedge, chrome]
  - name: agentCount
    displayName: 'Agents to distribute tests across (parallel)'
    type: number
    default: 1
  - name: enableAllure
    displayName: 'Also generate & publish the Allure HTML report'
    type: boolean
    default: false
  - name: minPassPercent
    displayName: 'Fail the build only if pass %% is below this'
    type: number
    default: 80
  - name: notifyEmail
    displayName: 'Email the run summary when finished'
    type: boolean
    default: true

schedules:
  - cron: '0 6 * * *'
    displayName: 'Nightly TS06 smoke run'
    branches:
      include:
        - main
    always: false

variables:
  # Library variable group with the secrets the suite reads from the env:
  #   PLAYWRIGHT_USERNAME, DbSettings__DbUserId, DbSettings__DbPassword
  - group: PlaywrightAutomation-Secrets
  - name: buildConfiguration
    value: 'Release'
  - name: solution
    value: 'PlaywrightAutomation.sln'
  # ---- Email (Option B) -------------------------------------------------
  # Set smtpServer to your internal SMTP relay to turn on emailed summaries.
  # While it is blank the email step logs the summary and skips sending, so the
  # pipeline never fails just because email isn't wired up yet.
  - name: smtpServer
    value: ''                                   # e.g. 'smtp.dq.ad'
  - name: smtpPort
    value: '25'
  - name: emailFrom
    value: 'WW-Smoke-NoReply@greatdentalplans.com'
  - name: emailTo
    value: 'eh07@greatdentalplans.com'          # comma-separate for multiple

jobs:
  - job: RunWWSmoke
    displayName: 'WW Smoke (${{ parameters.testScope }})'
    timeoutInMinutes: 120
    pool:
      name: AppSvcs-OnPrem-SQA
    # Wipe the agent's _work for this pipeline at the start of every run so old
    # checkouts / bin / obj don't accumulate and fill the disk.
    workspace:
      clean: all
    # Distribute the filtered tests across N agents. VSTest slices the matched
    # tests automatically - each agent runs its slice and publishes to the same
    # run. Needs N agents free in the pool.
    strategy:
      parallel: ${{ parameters.agentCount }}
    steps:
      # Shallow clone (fetchDepth: 1) - only the latest commit, no history, to
      # keep the per-agent checkout small.
      - checkout: self
        clean: true
        fetchDepth: 1

      # Reclaim disk before the heavy restore/build. Best-effort: never fails the
      # run. NOTE: do NOT delete %LOCALAPPDATA%\ms-playwright - the runtime
      # resolves ffmpeg (video) from there; wiping it makes every test throw
      # "ffmpeg-win64.exe doesn't exist". The big repeated cost is _work, which
      # 'workspace: clean: all' already handles.
      - powershell: |
          $ErrorActionPreference = 'SilentlyContinue'
          function Free { (Get-PSDrive -Name ($env:SystemDrive.TrimEnd(':'))).Free/1GB }
          Write-Host ("Free before: {0:N1} GB" -f (Free))
          Remove-Item "$env:TEMP\*"               -Recurse -Force
          Remove-Item "$env:LOCALAPPDATA\Temp\*"  -Recurse -Force
          # NuGet http cache (not the global-packages restore needs); safe to drop.
          & dotnet nuget locals http-cache --clear 2>$null
          Write-Host ("Free after:  {0:N1} GB" -f (Free))
          exit 0
        displayName: 'Reclaim disk space'

      # Fail fast with a clear message if required secrets are missing, instead of
      # hanging at the app Sign In page (PLAYWRIGHT_USERNAME) or erroring deep in a
      # DB call (DbSettings__*). Catches an unauthorized/missing variable group too.
      - powershell: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:PLAYWRIGHT_USERNAME))   { $missing += 'PLAYWRIGHT_USERNAME' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbUserId))   { $missing += 'DbSettings__DbUserId' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbPassword)) { $missing += 'DbSettings__DbPassword' }
          if ($missing.Count -gt 0) {
            Write-Host "##vso[task.logissue type=error]Missing required variable(s): $($missing -join ', '). Check that the 'PlaywrightAutomation-Secrets' variable group is linked AND authorized for this pipeline (Library -> group -> Pipeline permissions)."
            exit 1
          }
          Write-Host "All required variables are present."
        displayName: 'Verify required variables'
        env:
          PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
          DbSettings__DbUserId: $(DbSettings__DbUserId)
          DbSettings__DbPassword: $(DbSettings__DbPassword)

      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.x'

      - task: VisualStudioTestPlatformInstaller@1
        displayName: 'Install VSTest platform'
        inputs:
          packageFeedSelector: 'nugetOrg'
          versionSelector: 'latestStable'

      - task: DotNetCoreCLI@2
        displayName: 'Restore'
        inputs:
          command: 'restore'
          projects: '$(solution)'
          feedsToUse: 'config'
          nugetConfigPath: 'NuGet.Config'

      - task: DotNetCoreCLI@2
        displayName: 'Build ($(buildConfiguration))'
        inputs:
          command: 'build'
          projects: '$(solution)'
          # EnableAllure=true defines the ALLURE symbol so the [AllureNUnit] hook
          # compiles in; false (default) leaves the normal run unaffected.
          # MSBuild '==' is case-insensitive, so the True/False value works directly.
          arguments: '--configuration $(buildConfiguration) --no-restore /p:EnableAllure=${{ parameters.enableAllure }}'

      - powershell: |
          $ErrorActionPreference = 'Continue'
          $channel = "${{ parameters.browserChannel }}"
          # Match the fixture: keep Playwright's browsers/ffmpeg next to the package so
          # what we install here is found at runtime.
          $env:PLAYWRIGHT_BROWSERS_PATH = '0'
          $script = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "playwright.ps1" |
                    Where-Object { $_.FullName -like "*\bin\$(buildConfiguration)\*" } |
                    Select-Object -First 1
          if (-not $script) { Write-Error "playwright.ps1 not found - build may have failed"; exit 1 }

          # ffmpeg is required for video recording and is NOT bundled with the system
          # browser. Install it (small) so PLAYWRIGHT_RECORD_VIDEO works.
          & $script.FullName install ffmpeg

          # Ensure the browser channel. If the system browser is already on the agent,
          # Playwright refuses to install over it (exits 1, "already installed") - the
          # desired state - so use the system install; otherwise download the channel.
          $systemPaths = @{
            'msedge' = @(
              "$Env:ProgramFiles\Microsoft\Edge\Application\msedge.exe",
              "${Env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe")
            'chrome' = @(
              "$Env:ProgramFiles\Google\Chrome\Application\chrome.exe",
              "${Env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe")
          }
          if ($systemPaths[$channel] | Where-Object { Test-Path $_ }) {
            Write-Host "System '$channel' found; Channel=$channel will use it. Skipping browser download."
          } else {
            Write-Host "System '$channel' not found; installing it via Playwright."
            & $script.FullName install $channel
          }
          exit 0
        displayName: 'Ensure Playwright browser + ffmpeg (${{ parameters.browserChannel }})'

      # Translate the friendly scope into a VSTest test-case filter (NUnit
      # categories map to TestCategory; Delta is excluded by class/namespace).
      - powershell: |
          # 'Smoke (TestEnv)' = all TestEnv tests, minus Delta, minus the 10
          # TestEnv tests that were NOT in the legacy curated smoke set (4 claim-
          # image validations + 6 nav tests) so the count matches exactly 173.
          $smoke = 'TestCategory=TestEnv' +
                   '&FullyQualifiedName!~Delta' +
                   '&FullyQualifiedName!~ClaimImage' +
                   '&FullyQualifiedName!~NavigateToIncrementalRateChangeLog' +
                   '&FullyQualifiedName!~NavigateToRetroactivitySubmitter' +
                   '&FullyQualifiedName!~NavigateToBillingConfigPreview' +
                   '&FullyQualifiedName!~NavigateToClientUpdateTools' +
                   '&FullyQualifiedName!~NavigateToReferenceValues' +
                   '&FullyQualifiedName!~NavigateToWw2PaymentandBack'
          $map = @{
            'Smoke (TestEnv)'  = $smoke
            'WebServer (Prod)' = 'TestCategory=WebServer'
            'Regression'       = 'TestCategory=Regression'
            'All (no Delta)'   = 'FullyQualifiedName!~Delta'
          }
          $sel = "${{ parameters.testScope }}"
          $filter = $map[$sel]
          if ([string]::IsNullOrWhiteSpace($filter)) {
            Write-Host "##vso[task.logissue type=error]Unknown test scope '$sel'."
            exit 1
          }
          Write-Host "Scope '$sel' -> filter: $filter"
          Write-Host "##vso[task.setvariable variable=resolvedFilter]$filter"
        displayName: 'Resolve test filter (${{ parameters.testScope }})'

      # Run the matched tests. Results auto-publish to the build's "Tests" tab
      # (per-test outcome, failure message + stack, and the Playwright
      # screenshot/trace/video attached on failure). continueOnError: the
      # pass-rate gate below decides build success, not individual failures.
      - task: VSTest@2
        displayName: 'Run WW Smoke (${{ parameters.testScope }} / ${{ parameters.testEnv }})'
        continueOnError: true
        inputs:
          testSelector: 'testAssemblies'
          testAssemblyVer2: |
            **\bin\**\PlaywrightAutomation.dll
            !**\*TestAdapter.dll
            !**\ref\**
            !**\obj\**
          searchFolder: '$(System.DefaultWorkingDirectory)'
          testFilterCriteria: '$(resolvedFilter)'
          # Use the modern platform from VisualStudioTestPlatformInstaller@1.
          # Without this, VSTest falls back to the agent's legacy 14.0 platform,
          # which cannot load .NET 8 / NUnit3 assemblies (discovers 0 tests).
          vsTestVersion: 'toolsInstaller'
          uiTests: true
          runInParallel: false
          codeCoverageEnabled: false
          testRunTitle: 'WW Smoke - ${{ parameters.testScope }} - ${{ parameters.testEnv }}'
        env:
          TEST_ENV: ${{ parameters.testEnv }}
          PLAYWRIGHT_BROWSER_CHANNEL: ${{ parameters.browserChannel }}
          # Video is OFF (empty). It is the only thing that needs ffmpeg and has
          # been a recurring failure source; Playwright trace + failure
          # screenshots (no ffmpeg) give richer debugging anyway. Set to 'true'
          # to re-enable once ffmpeg is reliably present on every agent.
          PLAYWRIGHT_RECORD_VIDEO: ''
          PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
          DbSettings__DbUserId: $(DbSettings__DbUserId)
          DbSettings__DbPassword: $(DbSettings__DbPassword)

      # ---- Optional Allure HTML report -------------------------------------
      # The native Tests tab already gives detailed, clickable failure reporting.
      # Allure adds a richer standalone HTML report (steps, history) - opt-in via
      # 'enableAllure'. Best-effort: never fails the build.
      - ${{ if eq(parameters.enableAllure, true) }}:
        - powershell: |
            $staging = "$(Build.ArtifactStagingDirectory)\allure-results"
            New-Item -ItemType Directory -Force -Path $staging | Out-Null
            $found = Get-ChildItem -Path "$(System.DefaultWorkingDirectory)" -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue
            foreach ($d in $found) {
              Copy-Item -Path (Join-Path $d.FullName '*') -Destination $staging -Recurse -Force -ErrorAction SilentlyContinue
            }
            Write-Host "Collected allure-results into $staging"
          displayName: 'Collect Allure results'
          condition: succeededOrFailed()

        - powershell: |
            $results = "$(Build.ArtifactStagingDirectory)\allure-results"
            $report  = "$(Build.ArtifactStagingDirectory)\allure-report"
            if (-not (Test-Path $results) -or -not (Get-ChildItem $results -ErrorAction SilentlyContinue)) {
              Write-Host "No allure-results found; skipping report generation."; exit 0
            }
            try {
              if (Get-Command allure -ErrorAction SilentlyContinue) { & allure generate $results --clean -o $report }
              else { & npx --yes allure-commandline generate $results --clean -o $report }
              if (Test-Path (Join-Path $report 'index.html')) {
                Write-Host "##vso[task.setvariable variable=AllureReportGenerated]true"
              } else { Write-Host "##[warning]Allure generate produced no index.html." }
            } catch { Write-Host "##[warning]Could not generate Allure HTML (CLI/Java missing). Raw results still published. $_" }
            $global:LASTEXITCODE = 0; exit 0
          displayName: 'Generate Allure report'
          condition: succeededOrFailed()
          continueOnError: true

        - task: PublishPipelineArtifact@1
          displayName: 'Publish Allure results'
          condition: succeededOrFailed()
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/allure-results'
            artifact: 'allure-results-${{ parameters.testEnv }}-$(System.JobPositionInPhase)'
            publishLocation: 'pipeline'

        - task: PublishPipelineArtifact@1
          displayName: 'Publish Allure HTML report'
          condition: and(succeededOrFailed(), eq(variables['AllureReportGenerated'], 'true'))
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/allure-report'
            artifact: 'allure-report-${{ parameters.testEnv }}-$(System.JobPositionInPhase)'
            publishLocation: 'pipeline'

  # ==========================================================================
  # Email the run summary (Option B). Runs once after ALL test slices finish,
  # reads the build's aggregated pass/fail from the Test REST API, and emails
  # "X/Y passed" + a link via the internal SMTP relay. Included only when
  # notifyEmail=true; if smtpServer is blank it logs the summary and skips
  # sending. Requires pipeline "Allow scripts to access the OAuth token".
  # ==========================================================================
  - ${{ if eq(parameters.notifyEmail, true) }}:
    - job: EmailResults
      displayName: 'Email run summary'
      dependsOn: RunWWSmoke
      condition: succeededOrFailed()
      pool:
        name: AppSvcs-OnPrem-SQA
      variables:
        - name: testOutcome
          value: $[ dependencies.RunWWSmoke.result ]
      steps:
        - checkout: none
        - powershell: |
            $ErrorActionPreference = 'Continue'
            $hdr     = @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
            $base    = "$(System.CollectionUri)".TrimEnd('/') + "/" + [uri]::EscapeDataString("$(System.TeamProject)")
            $buildId = "$(Build.BuildId)"

            $passed=0; $failed=0; $other=0; $total=0
            try {
              $runs = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs?buildIds=$buildId&api-version=7.1"
              foreach ($r in $runs.value) {
                $d = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs/$($r.id)?api-version=7.1"
                foreach ($s in $d.runStatistics) {
                  switch ($s.outcome) {
                    'Passed' { $passed += [int]$s.count }
                    'Failed' { $failed += [int]$s.count }
                    default  { $other  += [int]$s.count }
                  }
                }
                $total += [int]$d.totalTests
              }
            } catch { Write-Host "##[warning]Could not read test results from REST API: $_" }
            if ($total -eq 0) { $total = $passed + $failed + $other }

            $scope   = "${{ parameters.testScope }}"
            $envName = "${{ parameters.testEnv }}"
            $pct     = if ($total -gt 0) { [math]::Round(100.0 * $passed / $total, 1) } else { 0 }
            $status  = if ($failed -gt 0) { 'FAILED' } elseif ($total -gt 0) { 'PASSED' } else { 'NO RESULTS' }
            $color   = if ($failed -gt 0) { '#c0392b' } elseif ($total -gt 0) { '#1e8e3e' } else { '#8a6d00' }
            $link    = "$base/_build/results?buildId=$buildId&view=ms.vss-test-web.build-test-results-tab"

            $subject = "WW Smoke [$envName / $scope]: $passed/$total passed ($pct%)"
            if ($failed -gt 0) { $subject += " - $failed FAILED" }

            $body = @"
            <div style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;color:#222">
              <h2 style="margin:0 0 4px">WW Smoke Tests - <span style="color:$color">$status</span></h2>
              <p style="margin:0 0 12px;color:#666">Scope <b>$scope</b> &middot; Environment <b>$envName</b> &middot; Browser <b>${{ parameters.browserChannel }}</b></p>
              <table cellpadding="6" style="border-collapse:collapse">
                <tr><td style="border:1px solid #ddd">Passed</td><td style="border:1px solid #ddd"><b>$passed</b></td></tr>
                <tr><td style="border:1px solid #ddd">Failed</td><td style="border:1px solid #ddd;color:#c0392b"><b>$failed</b></td></tr>
                <tr><td style="border:1px solid #ddd">Other</td><td style="border:1px solid #ddd">$other</td></tr>
                <tr><td style="border:1px solid #ddd">Total</td><td style="border:1px solid #ddd"><b>$total</b></td></tr>
                <tr><td style="border:1px solid #ddd">Pass rate</td><td style="border:1px solid #ddd"><b>$pct%</b></td></tr>
              </table>
              <p style="margin:14px 0"><a href="$link" style="background:#2563eb;color:#fff;padding:9px 16px;border-radius:6px;text-decoration:none">View results in Azure DevOps</a></p>
              <p style="color:#888;font-size:12px">Build $buildId &middot; pipeline result: $(testOutcome)</p>
            </div>
            "@

            $smtp = "$(smtpServer)"
            if ([string]::IsNullOrWhiteSpace($smtp)) {
              Write-Host "##[warning]smtpServer is not set - skipping email. Summary: $subject"
              exit 0
            }
            $to = "$(emailTo)".Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            $toList = $to -join ', '
            try {
              Send-MailMessage -SmtpServer $smtp -Port $(smtpPort) `
                -From "$(emailFrom)" -To $to -Subject $subject -Body $body -BodyAsHtml
              Write-Host "Sent run summary to $toList via $smtp"
            } catch {
              Write-Host "##[warning]Failed to send summary email via $smtp : $_"
            }
          displayName: 'Send result summary email'
          condition: succeededOrFailed()
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ==========================================================================
  # Pass-rate gate. Runs after all test slices, reads the build's aggregated
  # pass/fail, and fails the build ONLY if pass% < minPassPercent (default 80).
  # This is the reason VSTest uses continueOnError: individual test failures do
  # not fail the build - this gate is the single source of build success.
  # Requires pipeline "Allow scripts to access the OAuth token".
  # ==========================================================================
  - job: PassRateGate
    displayName: 'Pass-rate gate (min ${{ parameters.minPassPercent }}%)'
    dependsOn: RunWWSmoke
    condition: succeededOrFailed()
    pool:
      name: AppSvcs-OnPrem-SQA
    steps:
      - checkout: none
      - powershell: |
          $ErrorActionPreference = 'Continue'
          $hdr     = @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
          $base    = "$(System.CollectionUri)".TrimEnd('/') + "/" + [uri]::EscapeDataString("$(System.TeamProject)")
          $buildId = "$(Build.BuildId)"
          $passed=0; $total=0
          try {
            $runs = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs?buildIds=$buildId&api-version=7.1"
            foreach ($r in $runs.value) {
              $d = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs/$($r.id)?api-version=7.1"
              foreach ($s in $d.runStatistics) { if ($s.outcome -eq 'Passed') { $passed += [int]$s.count } }
              $total += [int]$d.totalTests
            }
          } catch { Write-Host "##[warning]Could not read test results: $_" }
          $min = [double]"${{ parameters.minPassPercent }}"
          $pct = if ($total -gt 0) { [math]::Round(100.0 * $passed / $total, 1) } else { 0 }
          Write-Host "Pass rate: $pct% ($passed / $total passed). Threshold: $min%."
          if ($total -eq 0) {
            Write-Host "##vso[task.logissue type=error]No test results were published for this build."
            exit 1
          }
          if ($pct -lt $min) {
            Write-Host "##vso[task.logissue type=error]Pass rate $pct% is below the $min% threshold - failing the build."
            exit 1
          }
          Write-Host "Pass rate $pct% meets the $min% threshold - build passes."
          exit 0
        displayName: 'Evaluate pass rate'
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
