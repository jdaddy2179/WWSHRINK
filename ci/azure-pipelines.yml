# ============================================================================
# WW Smoke — Playwright tests via `dotnet test` (business-unit matrix)
# ----------------------------------------------------------------------------
# Each business unit runs as its own matrix leg with `dotnet test`, writing a
# .trx to a KNOWN folder (--results-directory). Results publish to the native
# Azure DevOps "Tests" tab, the .trx files publish as artifacts, and a final
# job downloads those trx files (local read - no REST API) and builds ONE
# consolidated HTML report for management / release.
#
# Why this shape: reading test results from the ADO REST API on an agent hangs
# in this environment, and VSTest@2 hid the .trx. `dotnet test --results-
# directory` gives a deterministic local file we can always read.
#
# Runs on a SELF-HOSTED pool (AppSvcs-OnPrem-SQA): the suite targets internal
# *.dqtest.ad hosts, on-prem SQL, and an on-prem NuGet feed that Microsoft-
# hosted agents cannot reach.
# ============================================================================

trigger: none
pr: none

parameters:
  - name: testEnv
    displayName: 'Target environment (appsettings.<ENV>.json)'
    type: string
    default: TS06
    values: [DS01, DS10, QAR, PROD, TS06, TSHF, TSNB5, TSNB6, TSNB7, TSSLADJ]
  - name: browserChannel
    displayName: 'Browser to run on'
    type: string
    default: msedge
    values: [msedge, chrome]
  - name: maxParallel
    displayName: 'Business-unit legs to run at once (limits load on the app)'
    type: number
    default: 3
  - name: minPassPercent
    displayName: 'Fail the build only if pass %% is below this'
    type: number
    default: 98

variables:
  # Library variable group with the secrets the suite reads from the env:
  #   PLAYWRIGHT_USERNAME, DbSettings__DbUserId, DbSettings__DbPassword
  - group: PlaywrightAutomation-Secrets
  - name: buildConfiguration
    value: 'Release'
  - name: solution
    value: 'PlaywrightAutomation.sln'
  # Give each agent its OWN NuGet HTTP cache (under the agent's isolated temp).
  # Without this, two matrix legs on the same box share one cache and corrupt it
  # during concurrent restores ("Could not find file ...v3-cache...dat").
  - name: NUGET_HTTP_CACHE_PATH
    value: '$(Agent.TempDirectory)\nuget-httpcache'
  # Smoke filter suffix appended to each business-unit filter. Keeps the run to
  # the curated TestEnv smoke set: excludes Delta, the 10 tests that were never
  # in the legacy 173 (4 claim-image + 6 nav), and the 2 provider searches that
  # are quarantined pending valid TS06 data (Commercial, MassHealth).
  - name: smokeFilter
    value: '&TestCategory=TestEnv&FullyQualifiedName!~Delta&FullyQualifiedName!~ClaimImage&FullyQualifiedName!~NavigateToIncrementalRateChangeLog&FullyQualifiedName!~NavigateToRetroactivitySubmitter&FullyQualifiedName!~NavigateToBillingConfigPreview&FullyQualifiedName!~NavigateToClientUpdateTools&FullyQualifiedName!~NavigateToReferenceValues&FullyQualifiedName!~NavigateToWw2PaymentandBack&FullyQualifiedName!~ComNavigation.PeformFindAProviderSearch&FullyQualifiedName!~MassHealthSearches.PeformFindAProviderSearch'

jobs:
  - job: PlaywrightTests
    displayName: 'WW Smoke'
    # Cancel a leg if it overruns (fresh build + that BU's tests).
    timeoutInMinutes: 20
    # All environments run on the on-prem SQA pool (reaches internal
    # *.dqtest.ad / *.dq.ad hosts, on-prem SQL, on-prem NuGet feed).
    #
    # PROD uses IIS Integrated Windows Auth, so the browser sends the AGENT's
    # Windows identity. PROD therefore DEMANDS an agent tagged `prodAuth=true` -
    # i.e. one whose agent service runs as a prod-provisioned Windows account
    # (a real Windward PROD app user). Add that user capability to the agent:
    #   Org/Project Settings -> Agent pools -> AppSvcs-OnPrem-SQA -> <agent>
    #   -> Capabilities -> add user capability  prodAuth = true
    # (or set a PROD_AUTH=true env var for the agent's service and restart it).
    # Non-prod runs have no such demand and use any agent in the pool.
    pool:
      name: 'AppSvcs-OnPrem-SQA'
      ${{ if eq(parameters.testEnv, 'PROD') }}:
        demands:
          - prodAuth -equals true
    workspace:
      clean: all
    strategy:
      # One leg per business unit. The BU's name doubles as its .trx file name
      # so the report job can attribute results without parsing class metadata.
      matrix:
        Government:
          BU: 'Government'
          BUFilter: 'FullyQualifiedName~Tests.Gov'
        Commercial:
          BU: 'Commercial'
          BUFilter: 'FullyQualifiedName~Tests.Com'
        BCBSM:
          BU: 'BCBSM'
          BUFilter: 'FullyQualifiedName~Tests.Bcbsm'
        WW2:
          BU: 'WW2'
          BUFilter: 'FullyQualifiedName~Tests.Ww2'
        MassHealth:
          BU: 'MassHealth'
          BUFilter: 'FullyQualifiedName~Tests.MassHealth'
        # WebServer validation tests run ONLY on PROD (they target the prod
        # WebServer01-13 hosts). Conditionally add the leg for testEnv=PROD.
        ${{ if eq(parameters.testEnv, 'PROD') }}:
          WebServer:
            BU: 'WebServer'
            BUFilter: 'TestCategory=WebServer'
      maxParallel: ${{ parameters.maxParallel }}
    steps:
      - checkout: self
        clean: true
        fetchDepth: 1

      # Reclaim disk before the heavy restore/build. Best-effort. NOTE: do NOT
      # delete %LOCALAPPDATA%\ms-playwright (holds ffmpeg), and do NOT clear the
      # NuGet http-cache here - clearing the shared cache mid-restore corrupts a
      # concurrent leg on the same box. Each leg now uses its own isolated cache
      # (NUGET_HTTP_CACHE_PATH) so there's nothing to clear.
      - powershell: |
          $ErrorActionPreference = 'SilentlyContinue'
          Remove-Item "$env:TEMP\*"               -Recurse -Force -Exclude 'nuget-httpcache'
          exit 0
        displayName: 'Reclaim disk space'

      - powershell: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:PLAYWRIGHT_USERNAME))   { $missing += 'PLAYWRIGHT_USERNAME' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbUserId))   { $missing += 'DbSettings__DbUserId' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbPassword)) { $missing += 'DbSettings__DbPassword' }
          if ($missing.Count -gt 0) {
            Write-Host "##vso[task.logissue type=error]Missing required variable(s): $($missing -join ', '). Check the 'PlaywrightAutomation-Secrets' variable group is linked AND authorized for this pipeline."
            exit 1
          }
          Write-Host "All required variables are present."
        displayName: 'Verify required variables'
        env:
          PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
          DbSettings__DbUserId: $(DbSettings__DbUserId)
          DbSettings__DbPassword: $(DbSettings__DbPassword)

      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.x'

      - task: DotNetCoreCLI@2
        displayName: 'Restore'
        inputs:
          command: 'restore'
          projects: '$(solution)'
          feedsToUse: 'config'
          nugetConfigPath: 'NuGet.Config'

      - task: DotNetCoreCLI@2
        displayName: 'Build ($(buildConfiguration))'
        inputs:
          command: 'build'
          projects: '$(solution)'
          arguments: '--configuration $(buildConfiguration) --no-restore'

      - powershell: |
          $ErrorActionPreference = 'Continue'
          $channel = "${{ parameters.browserChannel }}"
          $env:PLAYWRIGHT_BROWSERS_PATH = '0'
          $script = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "playwright.ps1" |
                    Where-Object { $_.FullName -like "*\bin\$(buildConfiguration)\*" } |
                    Select-Object -First 1
          if (-not $script) { Write-Error "playwright.ps1 not found - build may have failed"; exit 1 }
          $systemPaths = @{
            'msedge' = @("$Env:ProgramFiles\Microsoft\Edge\Application\msedge.exe","${Env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe")
            'chrome' = @("$Env:ProgramFiles\Google\Chrome\Application\chrome.exe","${Env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe")
          }
          if ($systemPaths[$channel] | Where-Object { Test-Path $_ }) {
            Write-Host "System '$channel' found; will use it."
          } else {
            Write-Host "System '$channel' not found; installing it via Playwright."
            & $script.FullName install $channel
          }
          exit 0
        displayName: 'Ensure Playwright browser (${{ parameters.browserChannel }})'

      # Run this business unit's tests. The .trx is named after the BU and lands
      # in a known folder. Individual test failures do NOT fail the leg - the
      # pass-rate gate in the report job decides the build (so a single rotating
      # flaky test doesn't turn the build red). Real failures still show in the
      # Tests tab + report, and a regression trips the gate.
      - powershell: |
          $results = "$(Build.ArtifactStagingDirectory)\TestResults"
          New-Item -ItemType Directory -Force -Path $results | Out-Null
          # WebServer leg runs its category as-is; BU legs append the smoke filter
          # (TestEnv minus Delta/quarantined/etc.).
          if ("$(BU)" -eq "WebServer") { $filter = "$(BUFilter)" } else { $filter = "$(BUFilter)$(smokeFilter)" }
          Write-Host "Business unit : $(BU)"
          Write-Host "Filter        : $filter"
          dotnet test "$(solution)" --no-build --configuration $(buildConfiguration) `
            --filter "$filter" `
            --logger "trx;LogFileName=$(BU).trx" `
            --results-directory "$results"
          if ($LASTEXITCODE -ne 0) { Write-Host "##[warning]$(BU): some tests failed - the pass-rate gate decides the build." }
          exit 0
        displayName: 'Run $(BU) tests'
        env:
          TEST_ENV: ${{ parameters.testEnv }}
          PLAYWRIGHT_BROWSER_CHANNEL: ${{ parameters.browserChannel }}
          PLAYWRIGHT_RECORD_VIDEO: ''
          BrowserSettings__Headless: 'true'
          # PROD authenticates to the app via INTEGRATED Windows auth (the prod
          # app uses IIS Windows auth, not the test-env forms login). The browser
          # silently sends the AGENT's current Windows identity - so the agent
          # must run as an account with PROD access, and the agent box must have
          # "Automatic logon with current user name and password" enabled for the
          # zone (Internet Options -> Security). We therefore do NOT pass
          # PLAYWRIGHT_PASSWORD here: an HttpCredentials password would override
          # integrated auth and gets rejected (the 401 we saw). The fixture
          # already allowlists *.dq.ad for integrated auth.
          # DB still uses SQL auth with the prod service account.
          ${{ if eq(parameters.testEnv, 'PROD') }}:
            DbSettings__DbUserId: $(PLAYWRIGHT_USERNAME_PROD)
            DbSettings__DbPassword: $(PLAYWRIGHT_PASSWORD_PROD)
          ${{ else }}:
            PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
            DbSettings__DbUserId: $(DbSettings__DbUserId)
            DbSettings__DbPassword: $(DbSettings__DbPassword)

      - task: PublishTestResults@2
        displayName: 'Publish $(BU) results to Tests tab'
        condition: always()
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Build.ArtifactStagingDirectory)/TestResults/$(BU).trx'
          testRunTitle: 'WW Smoke - $(BU) - ${{ parameters.testEnv }}'
          failTaskOnFailedTests: false

      - task: PublishPipelineArtifact@1
        displayName: 'Publish $(BU) trx'
        condition: always()
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/TestResults'
          artifact: 'trx-$(BU)'
          publishLocation: 'pipeline'

  # ==========================================================================
  # Consolidated report. Downloads every BU's .trx (local artifact download - no
  # REST API), merges them, and publishes ONE management HTML: verdict, pass
  # rate, per-business-unit breakdown, and failed tests + reasons. Best-effort:
  # never fails the build.
  # ==========================================================================
  - job: ConsolidatedReport
    displayName: 'Consolidated test report'
    dependsOn: PlaywrightTests
    condition: succeededOrFailed()
    timeoutInMinutes: 10
    pool:
      name: 'AppSvcs-OnPrem-SQA'
    steps:
      - checkout: none

      - task: DownloadPipelineArtifact@2
        displayName: 'Download all BU trx'
        inputs:
          patterns: 'trx-*/**/*.trx'
          path: '$(Pipeline.Workspace)/trx'

      - powershell: |
          $ErrorActionPreference = 'Continue'
          $dir = "$(Build.ArtifactStagingDirectory)\report"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          function Enc($s){ if($null -eq $s){return ''}; ($s -replace '&','&amp;' -replace '<','&lt;' -replace '>','&gt;') }

          $trxFiles = Get-ChildItem -Path "$(Pipeline.Workspace)\trx" -Recurse -Filter *.trx -ErrorAction SilentlyContinue
          $tot=0; $pass=0; $fail=0; $durMs=0.0; $buRows=""; $failRows=""
          foreach ($f in ($trxFiles | Sort-Object Name)) {
            $bu = [IO.Path]::GetFileNameWithoutExtension($f.Name)
            [xml]$x = Get-Content -LiteralPath $f.FullName
            $bp=0; $bf=0
            foreach ($r in $x.TestRun.Results.UnitTestResult) {
              $out = $r.outcome
              if ($out -eq 'Passed') { $bp++ } else { $bf++ }
              if ($r.duration) { try { $durMs += [TimeSpan]::Parse($r.duration).TotalMilliseconds } catch {} }
              if ($out -ne 'Passed') {
                $msg = ""
                if ($r.Output -and $r.Output.ErrorInfo) { $msg = ($r.Output.ErrorInfo.Message + "`n" + $r.Output.ErrorInfo.StackTrace) }
                $failRows += "<tr><td>$bu</td><td>$(Enc $r.testName)</td><td><pre style='white-space:pre-wrap;margin:0;font:12px Consolas'>$(Enc $msg)</pre></td></tr>"
              }
            }
            $bc = $bp + $bf
            $bpct = if($bc){ [math]::Round(100.0*$bp/$bc,1) } else { 0 }
            $col = if($bf -gt 0){'#c0392b'}else{'#1e8e3e'}
            $buRows += "<tr><td>$bu</td><td style='text-align:right'>$bc</td><td style='text-align:right;color:#1e8e3e'>$bp</td><td style='text-align:right;color:#c0392b'>$bf</td><td style='text-align:right;color:$col'><b>$bpct%</b></td></tr>"
            $tot += $bc; $pass += $bp; $fail += $bf
          }
          if(-not $failRows){ $failRows = "<tr><td colspan='3' style='color:#1e8e3e'>None - all executed tests passed.</td></tr>" }
          $pct = if($tot){ [math]::Round(100.0*$pass/$tot,1) } else { 0 }
          $dur = [TimeSpan]::FromMilliseconds($durMs).ToString('hh\:mm\:ss')
          $verdict = if($fail -gt 0){'FAIL'} elseif($tot -gt 0){'PASS'} else {'NO RESULTS'}
          $vcol = if($fail -gt 0){'#c0392b'} elseif($tot -gt 0){'#1e8e3e'} else {'#8a6d00'}
          $when = Get-Date -Format 'yyyy-MM-dd HH:mm'
          $link = "$(System.CollectionUri)".TrimEnd('/') + "/" + [uri]::EscapeDataString("$(System.TeamProject)") + "/_build/results?buildId=$(Build.BuildId)&view=ms.vss-test-web.build-test-results-tab"

          $css = "body{font:14px Segoe UI,Arial;margin:0;color:#1f2937;background:#f8fafc}.wrap{max-width:1000px;margin:0 auto;padding:24px}" +
            "h1{font-size:22px;margin:0}h2{font-size:15px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin:28px 0 10px}.meta{color:#6b7280;margin:4px 0 0}" +
            ".banner{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 22px;margin-top:16px}.verdict{font-size:30px;font-weight:800;color:$vcol}" +
            ".cards{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}.card{flex:1;min-width:120px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}.card .n{font-size:24px;font-weight:700}.card .l{color:#6b7280;font-size:12px}" +
            "table{border-collapse:collapse;width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}td,th{border-bottom:1px solid #eef2f7;padding:9px 12px;text-align:left;vertical-align:top}th{background:#f3f4f6;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#6b7280}" +
            "a.btn{display:inline-block;margin-top:14px;background:#2563eb;color:#fff;padding:9px 16px;border-radius:8px;text-decoration:none}.foot{color:#9ca3af;font-size:12px;margin-top:24px}"

          $html = "<!doctype html><html><head><meta charset='utf-8'><title>WW Smoke - Release Readiness</title><style>$css</style></head><body><div class='wrap'>" +
            "<h1>WW Smoke Tests - Release Readiness</h1>" +
            "<p class='meta'>Environment <b>${{ parameters.testEnv }}</b> &middot; Browser <b>${{ parameters.browserChannel }}</b> &middot; Build $(Build.BuildId) &middot; $when</p>" +
            "<div class='banner'><div class='verdict'>$verdict</div><div><div style='font-size:22px;font-weight:700'>$pct% passed</div><div class='meta'>$pass of $tot tests &middot; total test time $dur</div></div></div>" +
            "<div class='cards'><div class='card'><div class='n'>$tot</div><div class='l'>Total</div></div>" +
            "<div class='card'><div class='n' style='color:#1e8e3e'>$pass</div><div class='l'>Passed</div></div>" +
            "<div class='card'><div class='n' style='color:#c0392b'>$fail</div><div class='l'>Failed</div></div>" +
            "<div class='card'><div class='n' style='color:$vcol'>$pct%</div><div class='l'>Pass rate</div></div></div>" +
            "<h2>Results by business unit</h2><table><tr><th>Business unit</th><th style='text-align:right'>Tests</th><th style='text-align:right'>Passed</th><th style='text-align:right'>Failed</th><th style='text-align:right'>Pass rate</th></tr>$buRows</table>" +
            "<h2>Failed tests</h2><table><tr><th>Business unit</th><th>Test</th><th>Reason</th></tr>$failRows</table>" +
            "<a class='btn' href='$link'>Open full results in Azure DevOps</a>" +
            "<p class='foot'>Generated by the WW Smoke pipeline. 2 provider-search tests (Commercial, MassHealth) are quarantined pending valid TS06 data. Per-test screenshots/traces are on the run's Tests tab.</p>" +
            "</div></body></html>"

          Set-Content -LiteralPath (Join-Path $dir "WW-Smoke-Report.html") -Value $html -Encoding UTF8
          Write-Host "Report: $verdict - $pass/$tot passed ($pct%), $fail failed, from $($trxFiles.Count) trx file(s)."
          # Hand the numbers to the gate step (same job).
          Write-Host "##vso[task.setvariable variable=passPct]$pct"
          Write-Host "##vso[task.setvariable variable=totalCount]$tot"
          exit 0
        displayName: 'Build consolidated HTML report'
        condition: succeededOrFailed()
        continueOnError: true

      - task: PublishPipelineArtifact@1
        displayName: 'Publish consolidated report'
        condition: succeededOrFailed()
        continueOnError: true
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/report'
          artifact: 'WW-Smoke-Report-${{ parameters.testEnv }}'
          publishLocation: 'pipeline'

      # Pass-rate gate: the single source of build success. Uses the pass% the
      # report step computed from the local trx (no REST). Fails the build only
      # below minPassPercent (default 98) - so 1-3 rotating flaky tests stay
      # green, but a real regression (or zero tests) goes red. Runs last so the
      # report is always published first.
      - powershell: |
          $pct = [double]"$(passPct)"
          $tot = [int]"$(totalCount)"
          $min = [double]"${{ parameters.minPassPercent }}"
          Write-Host "Executed: $tot tests. Pass rate: $pct%. Threshold: $min%."
          if ($tot -le 0) {
            Write-Host "##vso[task.logissue type=error]No tests were executed - failing the build."
            exit 1
          }
          if ($pct -lt $min) {
            Write-Host "##vso[task.logissue type=error]Pass rate $pct% is below the $min% threshold - failing the build."
            exit 1
          }
          Write-Host "Pass rate $pct% meets the $min% threshold - build passes."
          exit 0
        displayName: 'Pass-rate gate (min ${{ parameters.minPassPercent }}%)'
        condition: succeededOrFailed()
