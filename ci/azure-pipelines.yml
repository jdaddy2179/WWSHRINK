# ============================================================================
# WW Smoke — run automated tests from Azure Test Plans (YAML-native)
# ----------------------------------------------------------------------------
# Replaces the on-prem classic release "PlaywrightAutoRelease". Instead of a
# 9-stage release, this single YAML pipeline runs the automated tests that are
# associated with the test cases in:
#       Test Plan 79388  /  Suite 79389  /  Configuration 45  ("WW Smoke")
# and publishes pass/fail back onto the test points, so results show up in
# Azure Test Plans.
#
# Pick the target environment at run time (Run pipeline -> set 'testEnv').
# The app reads TEST_ENV and loads appsettings.<ENV>.json itself, so no
# File Transform step is needed (legacy used File Transform; not required here).
#
# Runs on a SELF-HOSTED pool (AppSvcs-OnPrem-SQA): the suite targets internal
# *.dqtest.ad hosts, on-prem SQL, and an on-prem NuGet feed that Microsoft-
# hosted agents cannot reach.
# ============================================================================

trigger: none
pr: none

parameters:
  - name: enableAllure
    displayName: 'Generate & publish Allure HTML report'
    type: boolean
    default: false
  - name: browserChannel
    displayName: 'Browser to run on'
    type: string
    default: msedge
    values: [msedge, chrome]
  - name: agentCount
    displayName: 'Agents to distribute tests across (parallel)'
    type: number
    default: 1
  - name: testSuite
    displayName: 'Environment suite to run'
    type: string
    default: 'Env - TS06'
    # Each Env suite is a 173-case leaf bound to that environment's
    # configuration. Selecting it forces the matching environment + config
    # (see the resolve step), so the run is self-consistent. Mapped to the
    # numeric Test Plan suite id below - keep in sync with that step's map.
    values:
      - 'Env - DS10'                    # 79807 - forces env/config DS10
      - 'Env - TS06'                    # 79808 - forces env/config TS06
      - 'Env - PROD'                    # 79809 - forces env/config PROD
  - name: notifyEmail
    displayName: 'Email the run summary when finished'
    type: boolean
    default: true

schedules:
  - cron: '0 6 * * *'
    displayName: 'Nightly QAR run'
    branches:
      include:
        - main
    always: false

variables:
  # Library variable group with the secrets the suite reads from the env:
  #   PLAYWRIGHT_USERNAME, DbSettings__DbUserId, DbSettings__DbPassword
  - group: PlaywrightAutomation-Secrets
  - name: buildConfiguration
    value: 'Release'
  - name: solution
    value: 'PlaywrightAutomation.sln'
  # ---- Email (Option B) -------------------------------------------------
  # Set smtpServer to your internal SMTP relay to turn on emailed summaries.
  # While it is blank the email job runs but skips sending (logs a warning),
  # so the pipeline never fails just because email isn't wired up yet.
  # Tip: keep smtpServer/emailFrom in the variable group instead if you'd
  # rather not have them in the YAML.
  - name: smtpServer
    value: ''                                   # e.g. 'smtp.dq.ad'
  - name: smtpPort
    value: '25'
  - name: emailFrom
    value: 'WW-Smoke-NoReply@greatdentalplans.com'
  - name: emailTo
    value: 'eh07@greatdentalplans.com'          # comma-separate for multiple

jobs:
  - job: RunWWSmoke
    displayName: 'WW Smoke (${{ parameters.testSuite }})'
    timeoutInMinutes: 120
    pool:
      name: AppSvcs-OnPrem-SQA
    # Distribute the test plan's test points across N agents. VSTest distributed
    # testing slices the cases automatically - each agent builds and runs its
    # slice, publishing to the same test run. Needs N agents free in the pool.
    strategy:
      parallel: ${{ parameters.agentCount }}
    steps:
      - checkout: self
        clean: true

      # Fail fast with a clear message if required secrets are missing, instead of
      # hanging at the app Sign In page (PLAYWRIGHT_USERNAME) or erroring deep in a
      # DB call (DbSettings__*). Catches an unauthorized/missing variable group too.
      - powershell: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:PLAYWRIGHT_USERNAME))   { $missing += 'PLAYWRIGHT_USERNAME' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbUserId))   { $missing += 'DbSettings__DbUserId' }
          if ([string]::IsNullOrWhiteSpace($env:DbSettings__DbPassword)) { $missing += 'DbSettings__DbPassword' }
          if ($missing.Count -gt 0) {
            Write-Host "##vso[task.logissue type=error]Missing required variable(s): $($missing -join ', '). Check that the 'PlaywrightAutomation-Secrets' variable group is linked AND authorized for this pipeline (Library -> group -> Pipeline permissions)."
            exit 1
          }
          Write-Host "All required variables are present."
        displayName: 'Verify required variables'
        env:
          PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
          DbSettings__DbUserId: $(DbSettings__DbUserId)
          DbSettings__DbPassword: $(DbSettings__DbPassword)

      - task: UseDotNet@2
        displayName: 'Install .NET 8 SDK'
        inputs:
          packageType: 'sdk'
          version: '8.x'

      - task: VisualStudioTestPlatformInstaller@1
        displayName: 'Install VSTest platform'
        inputs:
          packageFeedSelector: 'nugetOrg'
          versionSelector: 'latestStable'

      - task: DotNetCoreCLI@2
        displayName: 'Restore'
        inputs:
          command: 'restore'
          projects: '$(solution)'
          feedsToUse: 'config'
          nugetConfigPath: 'NuGet.Config'

      - task: DotNetCoreCLI@2
        displayName: 'Build ($(buildConfiguration))'
        inputs:
          command: 'build'
          projects: '$(solution)'
          # EnableAllure=true defines the ALLURE symbol so the [AllureNUnit] hook
          # compiles in; false (default) leaves the normal run unaffected.
          # MSBuild '==' is case-insensitive, so the True/False value works directly.
          arguments: '--configuration $(buildConfiguration) --no-restore /p:EnableAllure=${{ parameters.enableAllure }}'

      - powershell: |
          $ErrorActionPreference = 'Continue'
          $channel = "${{ parameters.browserChannel }}"
          # Match the fixture: keep Playwright's browsers/ffmpeg next to the package so
          # what we install here is found at runtime.
          $env:PLAYWRIGHT_BROWSERS_PATH = '0'
          $script = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "playwright.ps1" |
                    Where-Object { $_.FullName -like "*\bin\$(buildConfiguration)\*" } |
                    Select-Object -First 1
          if (-not $script) { Write-Error "playwright.ps1 not found - build may have failed"; exit 1 }

          # ffmpeg is required for video recording and is NOT bundled with the system
          # browser. Install it (small) so PLAYWRIGHT_RECORD_VIDEO works.
          & $script.FullName install ffmpeg

          # Ensure the browser channel. If the system browser is already on the agent,
          # Playwright refuses to install over it (exits 1, "already installed") - the
          # desired state - so use the system install; otherwise download the channel.
          $systemPaths = @{
            'msedge' = @(
              "$Env:ProgramFiles\Microsoft\Edge\Application\msedge.exe",
              "${Env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe")
            'chrome' = @(
              "$Env:ProgramFiles\Google\Chrome\Application\chrome.exe",
              "${Env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe")
          }
          if ($systemPaths[$channel] | Where-Object { Test-Path $_ }) {
            Write-Host "System '$channel' found; Channel=$channel will use it. Skipping browser download."
          } else {
            Write-Host "System '$channel' not found; installing it via Playwright."
            & $script.FullName install $channel
          }
          exit 0
        displayName: 'Ensure Playwright browser + ffmpeg (${{ parameters.browserChannel }})'

      # Map the friendly business-unit selection to its numeric Test Plan suite id.
      # Keep this map in sync with the 'testSuite' parameter values above.
      - powershell: |
          $map = @{
            'Env - DS10' = '79807'
            'Env - TS06' = '79808'
            'Env - PROD' = '79809'
          }
          $sel = "${{ parameters.testSuite }}"
          $id  = $map[$sel]
          if ([string]::IsNullOrWhiteSpace($id)) {
            Write-Host "##vso[task.logissue type=error]Unknown suite selection '$sel'."
            exit 1
          }
          Write-Host "Suite selection '$sel' -> suite id $id"
          Write-Host "##vso[task.setvariable variable=resolvedSuiteId]$id"

          # The chosen 'Env - <ENV>' suite determines the environment, so the run
          # loads appsettings.<ENV>.json and records on that environment's Test
          # Configuration. Keep this map in sync with the Test Plan configurations.
          $cfgMap = @{ 'DS10' = '46'; 'TS06' = '47'; 'PROD' = '48' }
          $env = $sel -replace '^Env - ', ''
          $cfg = $cfgMap[$env]; if ([string]::IsNullOrWhiteSpace($cfg)) { $cfg = '45' }
          Write-Host "Environment '$env' -> configuration id $cfg"
          Write-Host "##vso[task.setvariable variable=resolvedTestEnv]$env"
          Write-Host "##vso[task.setvariable variable=resolvedConfigId]$cfg"
        displayName: 'Resolve suite + env + config (${{ parameters.testSuite }})'

      # Runs the automated tests for the test points in Plan/Suite/Config and
      # writes their outcomes back to Azure Test Plans (testSelector: testPlan).
      # With strategy.parallel > 1, VSTest distributes the points across agents.
      - task: VSTest@2
        displayName: 'Run WW Smoke test plan (${{ parameters.testSuite }})'
        inputs:
          testSelector: 'testPlan'
          testPlan: '79388'
          testSuite: '$(resolvedSuiteId)'
          testConfiguration: '$(resolvedConfigId)'
          searchFolder: '$(System.DefaultWorkingDirectory)'
          testAssemblyVer2: |
            **\bin\**\PlaywrightAutomation.dll
            !**\*TestAdapter.dll
            !**\ref\**
            !**\obj\**
          # Use the modern platform from VisualStudioTestPlatformInstaller@1.
          # Without this, VSTest falls back to the agent's legacy 14.0 platform,
          # which cannot load .NET 8 / NUnit3 assemblies (discovers 0 tests).
          vsTestVersion: 'toolsInstaller'
          uiTests: true
          runInParallel: false
          codeCoverageEnabled: false
          testRunTitle: 'WW Smoke - $(resolvedTestEnv)'
        env:
          # resolvedTestEnv = the testEnv parameter, except an 'Env - <ENV>'
          # suite forces its own environment so the run is self-consistent.
          TEST_ENV: $(resolvedTestEnv)
          PLAYWRIGHT_BROWSER_CHANNEL: ${{ parameters.browserChannel }}
          # Enable video (ffmpeg installed above). Set to '' in the run to disable.
          PLAYWRIGHT_RECORD_VIDEO: 'true'
          PLAYWRIGHT_USERNAME: $(PLAYWRIGHT_USERNAME)
          DbSettings__DbUserId: $(DbSettings__DbUserId)
          DbSettings__DbPassword: $(DbSettings__DbPassword)

      # ---- Reporting --------------------------------------------------------
      # Playwright trace + video + failure screenshots are ALWAYS attached to each
      # test result by the fixture (visible in the run's "Tests" tab -> Attachments)
      # - the ADO-native path. The Allure HTML report below is opt-in via the
      # 'enableAllure' parameter so the default run stays lean.
      - ${{ if eq(parameters.enableAllure, true) }}:
        # Collect allure-results (written next to the test assembly) into a stable
        # staging folder, regardless of where on the agent the test host ran.
        - powershell: |
            $staging = "$(Build.ArtifactStagingDirectory)\allure-results"
            New-Item -ItemType Directory -Force -Path $staging | Out-Null
            $found = Get-ChildItem -Path "$(System.DefaultWorkingDirectory)" -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue
            $count = 0
            foreach ($d in $found) {
              Copy-Item -Path (Join-Path $d.FullName '*') -Destination $staging -Recurse -Force -ErrorAction SilentlyContinue
              $count++
            }
            Write-Host "Collected allure-results from $count folder(s) into $staging"
          displayName: 'Collect Allure results'
          condition: succeededOrFailed()

        # Generate the HTML report. Non-blocking: if the Allure CLI / Java is not on
        # the agent, the raw results are still published (render later or via the
        # Allure Azure DevOps extension). Install once on the agent for live reports:
        #   npm i -g allure-commandline   (requires Java 8+ on PATH)
        - powershell: |
            $results = "$(Build.ArtifactStagingDirectory)\allure-results"
            $report  = "$(Build.ArtifactStagingDirectory)\allure-report"
            if (-not (Test-Path $results) -or -not (Get-ChildItem $results -ErrorAction SilentlyContinue)) {
              Write-Host "No allure-results found; skipping report generation."
              exit 0
            }
            $allure = (Get-Command allure -ErrorAction SilentlyContinue)
            try {
              if ($allure) {
                & allure generate $results --clean -o $report
              } else {
                Write-Host "Allure CLI not found on PATH; trying 'npx allure-commandline'..."
                & npx --yes allure-commandline generate $results --clean -o $report
              }
              if (Test-Path (Join-Path $report 'index.html')) {
                Write-Host "Allure HTML report generated at $report"
                Write-Host "##vso[task.setvariable variable=AllureReportGenerated]true"
              } else {
                Write-Host "##[warning]Allure generate ran but no index.html was produced."
              }
            } catch {
              Write-Host "##[warning]Could not generate Allure HTML (CLI/Java missing). Raw results are still published. $_"
            }
            # Reporting is best-effort: never let a non-zero CLI exit fail the step.
            $global:LASTEXITCODE = 0
            exit 0
          displayName: 'Generate Allure report'
          condition: succeededOrFailed()
          continueOnError: true

        - task: PublishPipelineArtifact@1
          displayName: 'Publish Allure results'
          condition: succeededOrFailed()
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/allure-results'
            artifact: 'allure-results-$(resolvedTestEnv)-$(System.JobPositionInPhase)'
            publishLocation: 'pipeline'

        - task: PublishPipelineArtifact@1
          displayName: 'Publish Allure HTML report'
          condition: and(succeededOrFailed(), eq(variables['AllureReportGenerated'], 'true'))
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/allure-report'
            artifact: 'allure-report-$(resolvedTestEnv)-$(System.JobPositionInPhase)'
            publishLocation: 'pipeline'

  # ==========================================================================
  # Email the run summary (Option B). Runs once after ALL test slices finish
  # (dependsOn), reads the aggregated pass/fail for this build from the Test
  # REST API, and emails "X/Y passed" + a link via the internal SMTP relay.
  # Included only when notifyEmail=true; if smtpServer is blank it logs the
  # summary and skips sending so the pipeline still succeeds.
  # Requires: pipeline "Allow scripts to access the OAuth token" (System.AccessToken).
  # ==========================================================================
  - ${{ if eq(parameters.notifyEmail, true) }}:
    - job: EmailResults
      displayName: 'Email run summary'
      dependsOn: RunWWSmoke
      condition: succeededOrFailed()
      pool:
        name: AppSvcs-OnPrem-SQA
      variables:
        - name: testOutcome
          value: $[ dependencies.RunWWSmoke.result ]
      steps:
        - checkout: none
        - powershell: |
            $ErrorActionPreference = 'Continue'
            $hdr     = @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
            $base    = "$(System.CollectionUri)".TrimEnd('/') + "/" + [uri]::EscapeDataString("$(System.TeamProject)")
            $buildId = "$(Build.BuildId)"

            $passed=0; $failed=0; $other=0; $total=0
            try {
              $runs = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs?buildIds=$buildId&api-version=7.1"
              foreach ($r in $runs.value) {
                $d = Invoke-RestMethod -Headers $hdr -Uri "$base/_apis/test/runs/$($r.id)?api-version=7.1"
                foreach ($s in $d.runStatistics) {
                  switch ($s.outcome) {
                    'Passed' { $passed += [int]$s.count }
                    'Failed' { $failed += [int]$s.count }
                    default  { $other  += [int]$s.count }
                  }
                }
                $total += [int]$d.totalTests
              }
            } catch { Write-Host "##[warning]Could not read test results from REST API: $_" }
            if ($total -eq 0) { $total = $passed + $failed + $other }

            $bu      = "${{ parameters.testSuite }}"
            $envName = $bu -replace '^Env - ', ''
            $status  = if ($failed -gt 0) { 'FAILED' } elseif ($total -gt 0) { 'PASSED' } else { 'NO RESULTS' }
            $color   = if ($failed -gt 0) { '#c0392b' } elseif ($total -gt 0) { '#1e8e3e' } else { '#8a6d00' }
            $link    = "$base/_build/results?buildId=$buildId&view=ms.vss-test-web.build-test-results-tab"

            $subject = "WW Smoke [$envName / $bu]: $passed/$total passed"
            if ($failed -gt 0) { $subject += " - $failed FAILED" }

            $body = @"
            <div style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;color:#222">
              <h2 style="margin:0 0 4px">WW Smoke Tests - <span style="color:$color">$status</span></h2>
              <p style="margin:0 0 12px;color:#666">Suite <b>$bu</b> &middot; Environment <b>$envName</b> &middot; Browser <b>${{ parameters.browserChannel }}</b></p>
              <table cellpadding="6" style="border-collapse:collapse">
                <tr><td style="border:1px solid #ddd">Passed</td><td style="border:1px solid #ddd"><b>$passed</b></td></tr>
                <tr><td style="border:1px solid #ddd">Failed</td><td style="border:1px solid #ddd;color:#c0392b"><b>$failed</b></td></tr>
                <tr><td style="border:1px solid #ddd">Other</td><td style="border:1px solid #ddd">$other</td></tr>
                <tr><td style="border:1px solid #ddd">Total</td><td style="border:1px solid #ddd"><b>$total</b></td></tr>
              </table>
              <p style="margin:14px 0"><a href="$link" style="background:#2563eb;color:#fff;padding:9px 16px;border-radius:6px;text-decoration:none">View results in Azure DevOps</a></p>
              <p style="color:#888;font-size:12px">Build $buildId &middot; pipeline result: $(testOutcome)</p>
            </div>
            "@

            $smtp = "${{ parameters.smtpServer }}"
            if ([string]::IsNullOrWhiteSpace($smtp)) {
              Write-Host "##[warning]smtpServer is not set - skipping email. Summary: $subject"
              exit 0
            }
            $to = "${{ parameters.emailTo }}".Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            $toList = $to -join ', '
            try {
              Send-MailMessage -SmtpServer $smtp -Port ${{ parameters.smtpPort }} `
                -From "${{ parameters.emailFrom }}" -To $to -Subject $subject -Body $body -BodyAsHtml
              Write-Host "Sent run summary to $toList via $smtp"
            } catch {
              Write-Host "##[warning]Failed to send summary email via $smtp : $_"
            }
          displayName: 'Send result summary email'
          condition: succeededOrFailed()
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
